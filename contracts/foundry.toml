[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true

verbosity = 2

# Remappings for clean imports
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Test config
fuzz = { runs = 256 }
invariant = { runs = 128, depth = 32 }

[rpc_endpoints]
amoy = "${AMOY_RPC}"
polygon = "${POLYGON_RPC}"
base_sepolia = "${BASE_SEPOLIA_RPC}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
optimism_sepolia = "${OPTIMISM_SEPOLIA_RPC}"

# Etherscan unified ("Multichain V2") — one ETHERSCAN_API_KEY covers every
# chain in the Etherscan family (Base / Arbitrum / Optimism / Polygon +
# their testnets + Ethereum mainnet). Foundry auto-resolves the v2
# endpoint by `chain` id, so per-chain `url` overrides are no longer
# needed. Sign up at https://etherscan.io/myapikey — paste the single
# key into ETHERSCAN_API_KEY.
[etherscan]
amoy = { key = "${ETHERSCAN_API_KEY}", chain = 80002 }
polygon = { key = "${ETHERSCAN_API_KEY}" }
base_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 84532 }
arbitrum_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 421614 }
optimism_sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155420 }
