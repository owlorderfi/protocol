services:
  postgres:
    image: postgres:16-alpine
    container_name: polyorder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: polyorder
      POSTGRES_PASSWORD: polyorder
      POSTGRES_DB: polyorder
    ports:
      - "5432:5432"
    volumes:
      - polyorder_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyorder"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  polyorder_postgres_data:
